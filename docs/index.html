<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a6bcc" />
  <title>ILIA HACCP — Températures</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <span style="font-size:1.6rem;">🌡️</span>
  <h1>ILIA HACCP</h1>
  <span class="subtitle" id="header-date"></span>
</header>

<nav>
  <button class="active" data-page="home"    onclick="showPage('home')">🏠 Accueil</button>
  <button              data-page="entry"   onclick="showPage('entry')">✏️ Saisie</button>
  <button              data-page="history" onclick="showPage('history')">📋 Historique</button>
  <button              data-page="dlc"     onclick="showPage('dlc')">🐟 DLC Poisson</button>
</nav>

<main>

  <!-- PAGE HOME -->
  <section id="page-home" class="page active">
    <h2 style="margin-bottom:16px;font-size:1.1rem;color:#64748b;">Sélectionner un restaurant</h2>
    <div class="restaurant-grid" id="restaurant-grid"></div>
  </section>

  <!-- PAGE ENTRY -->
  <section id="page-entry" class="page">

    <div id="entry-restaurant-banner"
         style="background:#dbeafe;border-radius:12px;padding:12px 16px;margin-bottom:20px;
                font-weight:700;color:#1a6bcc;font-size:1.05rem;display:none;"></div>

    <div class="form-group">
      <label for="sel-restaurant">Restaurant</label>
      <select id="sel-restaurant" onchange="onRestaurantChange()">
        <option value="">— choisir —</option>
      </select>
    </div>

    <div class="form-group">
      <label for="sel-fridge">Frigo / Congélateur</label>
      <select id="sel-fridge" onchange="onFridgeChange()" disabled>
        <option value="">— choisir un restaurant d'abord —</option>
      </select>
    </div>

    <div class="form-group">
      <label for="inp-employee">Employé</label>
      <select id="inp-employee" onchange="updateSubmitBtn()">
        <option value="">— choisir —</option>
        <option>Julien</option>
        <option>Guillaume</option>
        <option>Thomas</option>
        <option>Marie</option>
        <option>Lucas</option>
        <option>Sophie</option>
        <option>Alex</option>
        <option>Camille</option>
      </select>
    </div>

    <div class="form-group">
      <label for="inp-temp">Température mesurée</label>
      <div class="temp-wrapper">
        <input id="inp-temp" type="number" step="0.1" inputmode="decimal"
               placeholder="0.0" oninput="onTempInput()" />
        <span class="temp-unit">°C</span>
      </div>
      <div class="temp-indicator idle" id="temp-indicator">
        <span id="temp-icon">—</span>
        <span id="temp-label">Saisissez la température</span>
      </div>
    </div>

    <button class="btn btn-success" id="btn-submit" onclick="submitRecord()" disabled>
      ✅ Valider le relevé
    </button>
    <button class="btn btn-outline" onclick="showPage('home')">← Retour</button>
  </section>

  <!-- PAGE DLC POISSON -->
  <section id="page-dlc" class="page">

    <div class="form-group">
      <label for="dlc-restaurant">Restaurant</label>
      <select id="dlc-restaurant" onchange="updateDlcSubmitBtn()">
        <option value="">— choisir —</option>
      </select>
    </div>

    <div class="form-group">
      <label for="dlc-product">Produit</label>
      <select id="dlc-product" onchange="onDlcProductChange()">
        <option value="">— choisir —</option>
        <option>Saumon entier</option>
        <option>Filet de saumon</option>
        <option>Daurade entière</option>
        <option>Filet de daurade</option>
        <option>Bar entier</option>
        <option>Filet de bar</option>
        <option>Thon</option>
        <option>Crevettes</option>
        <option>Poulpe</option>
        <option value="Autre">Autre (saisie libre)</option>
      </select>
    </div>

    <div class="form-group" id="dlc-custom-group" style="display:none;">
      <label for="dlc-product-custom">Nom du produit (libre)</label>
      <input type="text" id="dlc-product-custom" placeholder="ex: Saint-Jacques" oninput="updateDlcSubmitBtn()" />
    </div>

    <div class="form-group">
      <label for="dlc-opened-date">Date d'ouverture</label>
      <input type="date" id="dlc-opened-date" onchange="onDlcDateChange()" />
    </div>

    <div id="dlc-date-display" style="display:none; margin-bottom:20px; padding:14px 16px;
         background:#dbeafe; border-radius:12px; color:#1a6bcc;">
      DLC calculée : <strong id="dlc-date-value" style="font-size:1.1rem;"></strong>
    </div>

    <div class="form-group">
      <label for="dlc-employee">Employé</label>
      <select id="dlc-employee" onchange="updateDlcSubmitBtn()">
        <option value="">— choisir —</option>
        <option>Julien</option>
        <option>Guillaume</option>
        <option>Thomas</option>
        <option>Marie</option>
        <option>Lucas</option>
        <option>Sophie</option>
        <option>Alex</option>
        <option>Camille</option>
      </select>
    </div>

    <button class="btn btn-success" id="btn-dlc-submit" onclick="submitDlcRecord()" disabled>
      🖨️ Enregistrer l'étiquette
    </button>
    <button class="btn btn-outline" onclick="showPage('home')">← Retour</button>

    <div id="dlc-label-preview" style="display:none; margin-top:24px;">
      <div class="label-card" id="dlc-label-card"></div>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="window.print()">
        🖨️ Imprimer
      </button>
    </div>

  </section>

  <!-- PAGE HISTORY -->
  <section id="page-history" class="page">

    <div class="history-filters">
      <select id="hist-restaurant" onchange="loadHistory()">
        <option value="">Tous les restaurants</option>
      </select>
      <input type="date" id="hist-date" onchange="loadHistory()" />
      <button class="btn btn-primary" onclick="loadHistory()">🔄</button>
    </div>

    <div id="history-content">
      <p class="empty-state">Sélectionnez un filtre pour afficher les relevés.</p>
    </div>

    <div id="dlc-history-content" style="margin-top:28px;"></div>

  </section>

</main>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
